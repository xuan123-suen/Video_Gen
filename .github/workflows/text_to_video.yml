name: Text to Video Generator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装系统级 FFmpeg 视频工具
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 安装 Python 绘图依赖
      run: |
        python -m pip install --upgrade pip
        pip install pillow

    - name: 运行 AI 视频生成脚本
      run: |
        python generate_video.py
        echo "=== 检查当前目录下生成的文件 ==="
        ls -la
        sleep 2

    - name: 将生成的视频上传到 GitHub 供下载
      uses: actions/upload-artifact@v4
      with:
        name: ai-generated-video
        path: output_video.mp4
        if-no-files-found: error
