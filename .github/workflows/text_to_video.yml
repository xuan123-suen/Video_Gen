name: Text to Video Generator

on:
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击按钮触发生成

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装网络依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 运行 AI 视频生成脚本
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} # 读取你刚刚配置的加密 Token
      run: python generate_video.py

    - name: 将生成的视频上传到 GitHub 供下载
      uses: actions/upload-artifact@v4
      with:
        name: ai-generated-video
        path: output_video.mp4
